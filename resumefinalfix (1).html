  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #fff;
      font-family: 'Sora', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ── ANIMATED BACKGROUND ── */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: float-orb 18s ease-in-out infinite;
    }
    .orb-1 {
      width: 40vw; height: 40vw;
      max-width: 520px; max-height: 520px;
      background: radial-gradient(circle, #7c3aed 0%, #4c1d95 60%, transparent 100%);
      top: -10%; left: -8%;
      animation-duration: 20s;
    }
    .orb-2 {
      width: 32vw; height: 32vw;
      max-width: 400px; max-height: 400px;
      background: radial-gradient(circle, #a855f7 0%, #6d28d9 60%, transparent 100%);
      bottom: -6%; right: -6%;
      animation-duration: 16s;
      animation-delay: -8s;
    }
    .orb-3 {
      width: 24vw; height: 24vw;
      max-width: 300px; max-height: 300px;
      background: radial-gradient(circle, #ec4899 0%, #9333ea 60%, transparent 100%);
      top: 45%; left: 55%;
      animation-duration: 22s;
      animation-delay: -4s;
    }
    .orb-4 {
      width: 20vw; height: 20vw;
      max-width: 250px; max-height: 250px;
      background: radial-gradient(circle, #06b6d4 0%, #7c3aed 60%, transparent 100%);
      top: 20%; right: 15%;
      animation-duration: 25s;
      animation-delay: -12s;
    }

    @keyframes float-orb {
      0%   { transform: translate(0, 0) scale(1); }
      25%  { transform: translate(40px, -60px) scale(1.08); }
      50%  { transform: translate(-30px, 40px) scale(0.95); }
      75%  { transform: translate(60px, 20px) scale(1.05); }
      100% { transform: translate(0, 0) scale(1); }
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: grid-shift 30s linear infinite;
    }
    @keyframes grid-shift {
      from { background-position: 0 0; }
      to   { background-position: 40px 40px; }
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle var(--d) ease-in-out var(--delay) infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity: 0; transform: scale(0); }
      50%     { opacity: 0.7; transform: scale(1); }
    }

    /* ── NAV ── */
    nav {
        position: absolute;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 32px;
        height: 60px;
        background: rgba(10, 10, 20, 0.38);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 50px;
        transition:
          transform 0.3s,
          box-shadow 0.3s;
      }
      nav:hover {
        transform: translateX(-50%) scale(1.03);
        box-shadow: 0 8px 30px rgba(124, 58, 237, 0.15);
      }
      nav a {
        color: rgba(255, 255, 255, 0.55);
        text-decoration: none;
        font-size: 1.05rem;
        font-weight: 500;
        letter-spacing: 0.3px;
        transition: color 0.2s;
        position: relative;
      }
      nav a::after {
        content: "";
        position: absolute;
        bottom: -3px;
        left: 0;
        right: 0;
        height: 1px;
        background: #c084fc;
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.25s ease;
      }
      nav a:hover {
        color: #fff;
      }
      nav a:hover::after {
        transform: scaleX(1);
      }
      .top-glow-section {
        position: absolute;
        top: 0;
        width: 100%;
        height: 700px;
        background-image: radial-gradient(
          circle at 50% -20%,
          rgba(255, 0, 212, 0.35) 0%,
          rgba(174, 0, 255, 0.164) 30%,
          transparent 50%
        );
        pointer-events: none;
        z-index: 1;
      }
      .nav-logo
     {
        height: 20px; /* Neenga 18px-20px kuduthu irukkinga, adha ingeye fix pannunga */
        width: auto;
        object-fit: contain;
      }

/* Star icon size control */
.nav-star {
    height: 18px; /* Star size inge maathunga */
    width: 15px;
    object-fit: contain;
    opacity: 0.8; /* Konjam light ah iruka */
}
    nav a {
      color: rgba(255,255,255,0.55); text-decoration: none;
      font-size: 0.9rem; font-weight: 500; letter-spacing: 0.3px;
      transition: color 0.2s;
      position: relative;
    }
    nav a::after {
      content: ''; position: absolute; bottom: -3px; left: 0; right: 0;
      height: 1px; background: #c084fc;
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.25s ease;
    }
    nav a:hover { color: #fff; }
    nav a:hover::after { transform: scaleX(1); }
    .nav-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(192,132,252,0.5);
      flex-shrink: 0;
    }

    /* ── PAGE LAYOUT ── */
    main {
      position: relative;
      z-index: 1;
      padding: 110px 16px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: page-fade-in 0.8s ease both;
    }
    @keyframes page-fade-in {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .page-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(168,85,247,0.8);
      margin-bottom: 12px;
      animation: page-fade-in 0.6s ease both;
      text-align: center;
    }
    .page-title {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      color: #fff;
      margin-bottom: 36px;
      text-align: center;
      animation: page-fade-in 0.7s ease both;
      animation-delay: 0.05s;
    }
    .page-title span {
      background: linear-gradient(90deg, #c084fc, #e879f9, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── RESUME GLASS CARD ── */
    .resume-wrapper {
      width: 100%;
      max-width: 820px;
      position: relative;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 10px;
      box-shadow:
        0 0 0 1px rgba(124,58,237,0.1),
        0 20px 60px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.08);
      animation: card-rise 0.9s cubic-bezier(0.16,1,0.3,1) both;
      animation-delay: 0.15s;
    }
    @keyframes card-rise {
      from { opacity: 0; transform: translateY(40px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .resume-wrapper::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 21px;
      background: linear-gradient(
        130deg,
        transparent 0%,
        rgba(168,85,247,0.25) 30%,
        rgba(236,72,153,0.15) 50%,
        rgba(6,182,212,0.1) 70%,
        transparent 100%
      );
      background-size: 300% 300%;
      animation: shimmer-border 6s linear infinite;
      z-index: -1;
      pointer-events: none;
    }
    @keyframes shimmer-border {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .resume-img {
      width: 100%;
      border-radius: 12px;
      display: block;
      filter: brightness(0.97) contrast(1.02);
    }

    /* ── GLASS DOWNLOAD BUTTON ── */
    .download-wrap {
      margin-top: 32px;
      display: flex;
      justify-content: center;
      animation: page-fade-in 1s ease both;
      animation-delay: 0.4s;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 36px;
      /* Glass effect */
      background: rgba(124, 58, 237, 0.18);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-decoration: none;
      border-radius: 50px;
      border: 1px solid rgba(192, 132, 252, 0.45);
      box-shadow:
        0 0 0 1px rgba(168,85,247,0.12),
        0 4px 24px rgba(124,58,237,0.25),
        inset 0 1px 0 rgba(255,255,255,0.18),
        inset 0 -1px 0 rgba(255,255,255,0.06);
      transition: transform 0.25s, box-shadow 0.25s, background 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    /* Inner glass shine */
    .download-btn::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.14) 0%, transparent 100%);
      border-radius: 50px 50px 0 0;
      pointer-events: none;
    }

    /* Pulse ring */
    .download-btn::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 54px;
      border: 1.5px solid rgba(168,85,247,0.35);
      animation: pulse-ring 2.5s ease-out infinite;
      pointer-events: none;
    }
    @keyframes pulse-ring {
      0%   { opacity: 1; transform: scale(1); }
      70%  { opacity: 0; transform: scale(1.12); }
      100% { opacity: 0; transform: scale(1.12); }
    }

    .download-btn:hover {
      transform: translateY(-3px) scale(1.04);
      background: rgba(124, 58, 237, 0.32);
      border-color: rgba(192, 132, 252, 0.7);
      box-shadow:
        0 0 0 1px rgba(168,85,247,0.2),
        0 8px 32px rgba(124,58,237,0.45),
        inset 0 1px 0 rgba(255,255,255,0.25),
        inset 0 -1px 0 rgba(255,255,255,0.08);
    }

    .download-btn:active {
      transform: translateY(0) scale(0.98);
    }

    .dl-icon {
      width: 17px; height: 17px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
